# Production stack for the Drupal backend on a single VM.
# Usage on the VM:  docker compose -f compose.prod.yaml up -d --build
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - ./:/var/www/html
      - drupal_files:/var/www/html/web/sites/default/files
      - ./keys:/var/www/html/keys
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: [.env]
    volumes:
      - ./:/var/www/html:ro
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  drupal_files: {}
  db_data: {}
  caddy_data: {}
  caddy_config: {}
